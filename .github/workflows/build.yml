name: Build binaries

on:
  push:
    tags:
      - "v*"        # triggers on v1.0, v1.1 etc
  workflow_dispatch:  # or trigger manually from GitHub UI

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install poetry
          poetry install
          poetry run pip install pyinstaller

      - name: Build binary
        run: poetry run pyinstaller --onefile src/repafiller/main.py --name repafiller

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: repafiller-${{ matrix.os }}
          path: dist/
